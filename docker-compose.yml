
services:
  bel-sekolah:
    build: .
    container_name: bel_sekolah
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./app:/app/app
      - ./data:/app/data
      - ./music:/app/music
      - /dev/bus/usb:/dev/bus/usb
    environment:
      - TZ=Asia/Jakarta
      - SESSION_SECRET=${SESSION_SECRET}
    privileged: true            # Akses dinamis ke USB (kombinasi dengan /dev/bus/usb volume)
    networks:
      - belmuhi

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${TUNNEL_TOKEN}
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    networks:
      - belmuhi
networks:
  belmuhi:
    driver: bridge
